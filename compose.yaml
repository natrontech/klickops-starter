# Local stand-ins for the services a klickops project provides:
# PostgreSQL, S3-compatible storage and a Valkey cache. `make
# services-up` to start, then copy .env.example to .env.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  s3:
    image: chrislusf/seaweedfs
    command: server -s3 -dir=/data
    ports:
      - "8333:8333"
    volumes:
      - s3data:/data

  valkey:
    image: valkey/valkey:8.1
    ports:
      - "6379:6379"

volumes:
  pgdata:
  s3data:
