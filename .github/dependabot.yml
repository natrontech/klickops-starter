version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
    groups:
      ui-dependencies:
        patterns: ["*"]
    ignore:
      # svelte-check does not support TypeScript 7 yet; drop this once
      # the Svelte toolchain runs on it.
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: weekly
